name: CI

on:
  push:
    branches:
      - main
      - "epic/**"
      - "feature/**"
  pull_request:
    branches:
      - main
      - "epic/**"

jobs:
  ci:
    name: Lint, Typecheck & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Test (unit tests only — integration tests require local Chromium)
        run: pnpm test --reporter=verbose
        env:
          KAZE_SKIP_E2E: "1"

      - name: Performance regression check
        run: |
          if [ -f benchmark/perf-results.json ]; then
            npx tsx benchmark/perf-check.ts
          else
            echo "No perf-results.json found, skipping regression check"
          fi
