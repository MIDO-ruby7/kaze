name: CI

on:
  push:
    branches:
      - main
      - "epic/**"
      - "feature/**"
  pull_request:
    branches:
      - main
      - "epic/**"

jobs:
  # ─────────────────────────────────────────────
  # 1. Static checks (fast, no browser needed)
  # ─────────────────────────────────────────────
  lint-typecheck:
    name: Lint & Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "pnpm"
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - run: pnpm lint
      - run: pnpm typecheck

  # ─────────────────────────────────────────────
  # 2. Unit tests (no browser needed)
  # ─────────────────────────────────────────────
  unit:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "pnpm"
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - name: Run unit tests
        run: pnpm test --reporter=verbose
        env:
          KAZE_SKIP_E2E: "1"

  # ─────────────────────────────────────────────
  # 3. E2E tests (real Chromium, sharded)
  # ─────────────────────────────────────────────
  e2e:
    name: E2E Tests (shard ${{ matrix.shard }}/${{ matrix.total }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        shard: [1, 2, 3, 4]
        total: [4]
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "pnpm"

      - run: pnpm install --frozen-lockfile
      - run: pnpm build

      - name: Install Chromium
        run: node bin/kaze.js install

      - name: Run E2E tests
        run: |
          node bin/kaze.js \
            --shard=${{ matrix.shard }}/${{ matrix.total }} \
            --workers=4 \
            --reporter=dot \
            --retries=1
        env:
          # kaze respects these env vars for tuning
          KAZE_WORKERS: "4"

      - name: Upload screenshots on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: kaze-screenshots-shard${{ matrix.shard }}
          path: .kaze/screenshots/
          retention-days: 7
